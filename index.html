<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gastos OWA</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
  font-size: 13px; background: #f7f7f9; color: #111118; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
header {
  background: #fff; border-bottom: 1px solid #e8e8ed; padding: 0 16px;
  display: flex; align-items: stretch; gap: 12px; position: sticky; top: 0; z-index: 100; height: 50px;
}
header h1 { font-size: 15px; font-weight: 700; letter-spacing: -.3px; white-space: nowrap; display: flex; align-items: center; margin-right: 4px; }
header h1 span.acc { color: #4f46e5; }
.tabs { display: flex; gap: 0; align-items: stretch; overflow-x: auto; }
.tab { padding: 0 12px; font-size: 13px; cursor: pointer; color: #999; display: flex; align-items: center; gap: 6px; white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; }
.tab:hover { color: #444; }
.tab.active { color: #111118; font-weight: 600; border-bottom-color: #4f46e5; }
.tab .badge { font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 10px; background: #efeff5; color: #999; min-width: 22px; text-align: center; line-height: 1.6; }
.tab.active .badge { background: #4f46e5; color: #fff; }
.hdr-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.hbtn { font-size: 12px; padding: 5px 12px; border: 1px solid #e5e5ea; border-radius: 6px; cursor: pointer; background: transparent; color: #666; white-space: nowrap; }
.hbtn:hover { background: #f5f5f8; }
#status { font-size: 11px; color: #bbb; }

.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ── Calibrar cards ─── */
.seccion { margin-bottom: 24px; }
.sec-hdr { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding-bottom: 10px; border-bottom: 1px solid #eaeaef; margin-bottom: 12px; }
.sec-hdr h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; flex: 1; color: #aaa; }
.sec-hdr .n { font-size: 12px; color: #ccc; }
.sec-hdr button { font-size: 12px; padding: 4px 12px; border: 1px solid #e5e5ea; border-radius: 6px; cursor: pointer; font-weight: 500; background: #fff; color: #666; }
.sec-hdr button:hover { background: #f5f5f8; }
.btn-sel { color: #4f46e5 !important; background: #f0f0fe !important; border-color: #c7d2fe !important; }
.btn-verde { background: #4f46e5 !important; color: #fff !important; border-color: #4f46e5 !important; }
.btn-rojo  { background: #dc2626 !important; color: #fff !important; border-color: #dc2626 !important; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.card { background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e8e8ed; position: relative; cursor: pointer; transition: box-shadow .15s, border-color .15s; }
.card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.07); border-color: #ccc; }
.card.sel { border-color: #4f46e5; box-shadow: 0 0 0 2px #e0e0fe; }
.card .chk { position: absolute; top: 6px; left: 6px; width: 18px; height: 18px; background: rgba(255,255,255,.92); border: 1.5px solid #ccc; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; z-index: 2; }
.card.sel .chk { background: #4f46e5; border-color: #4f46e5; color: #fff; }
.card img { width: 100%; height: 120px; object-fit: cover; display: block; background: #f0f0f4; }
.card .info { padding: 8px 9px; }
.card .det { font-size: 11px; color: #888; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card .acts { display: flex; gap: 4px; }
.card button { flex: 1; padding: 4px 3px; font-size: 11px; border-radius: 5px; cursor: pointer; border: 1px solid #e8e8ed; background: #f7f7f9; color: #666; }
.card button.cv { color: #4f46e5; border-color: #c7d2fe; background: #f0f0fe; }
.card button.cv:hover { background: #e0e0fe; }
.card button.cr { color: #dc2626; border-color: #fecaca; background: #fef2f2; }
.card button.cr:hover { background: #fee2e2; }
.empty-msg { text-align: center; padding: 50px 20px; color: #ccc; font-size: 13px; }

/* ── Float bar ─── */
#float-bar { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #18181b; color: #fff; border-radius: 12px; padding: 10px 16px; box-shadow: 0 4px 24px rgba(0,0,0,.3); z-index: 200; align-items: center; gap: 10px; white-space: nowrap; }
#float-bar.visible { display: flex; }
#float-bar .float-n { font-size: 13px; font-weight: 600; }
#float-bar button { font-size: 12px; padding: 5px 14px; border: none; border-radius: 7px; cursor: pointer; font-weight: 500; }
.fb-verde { background: #4f46e5; color: #fff; }
.fb-rojo  { background: #dc2626; color: #fff; }
.fb-cancel { background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); }

/* ── Lightbox ─── */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 1000; align-items: center; justify-content: center; cursor: zoom-out; }
#lightbox.open { display: flex; }
#lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }

/* ── Tabla ─── */
.tabla-wrap { overflow-x: auto; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
table { width: 100%; border-collapse: collapse; background: #fff; font-size: 13px; }
thead tr { background: #f7f7f9; border-bottom: 1px solid #e8e8ed; }
th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .4px; }
th.right { text-align: right; }
tbody tr { border-bottom: 1px solid #f0f0f4; cursor: pointer; transition: background .1s; }
tbody tr:hover { background: #f7f7fb; }
tbody tr.sel { background: #f0f0fe; }
td { padding: 8px 12px; }
td.right { text-align: right; }
td img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; display: block; }

/* ── Bulk bar ─── */
#bulk-bar { display: none; align-items: center; gap: 10px; background: #f7f8fa; border: 1px solid #e0e0e8; border-radius: 10px; padding: 8px 14px; margin-bottom: 10px; flex-wrap: wrap; }
#bulk-bar.visible { display: flex; }
#bulk-count { font-size: 12px; font-weight: 600; color: #555; }
.divider { color: #ddd; font-size: 11px; }
#bulk-cats { display: flex; gap: 6px; flex-wrap: wrap; }
#bulk-comercio-input { font-size: 12px; padding: 4px 9px; border: 1.5px solid #e0e0e8; border-radius: 7px; outline: none; min-width: 150px; background: #fff; }
#bulk-comercio-input:focus { border-color: #6366f1; }
.bulk-btn { padding: 5px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
.bulk-btn-blue { background: #5b6bf5; color: #fff; }
.bulk-btn-gray { background: #fff; color: #999; border: 1px solid #ddd !important; font-weight: 500; }
.bulk-btn-cancel { font-size: 11px; padding: 3px 9px; border-radius: 6px; border: 1px solid #e0e0e8; color: #aaa; background: #fff; cursor: pointer; }

/* ── Badges ─── */
.cat-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; color: #555; white-space: nowrap; }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.btn-confirmar-fila { padding: 3px 11px; border-radius: 6px; background: #f0f0fe; color: #4f46e5; border: 1px solid #c7d2fe; font-size: 11px; font-weight: 500; cursor: pointer; }
.btn-confirmar-fila:hover { background: #4f46e5; color: #fff; border-color: #4f46e5; }
.btn-rechazar-fila { padding: 3px 8px; border-radius: 6px; background: transparent; color: #ccc; border: 1px solid #e8e8ed; font-size: 11px; cursor: pointer; }
.btn-rechazar-fila:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

/* ── Búsqueda ─── */
.search-bar { display: flex; align-items: center; gap: 6px; background: #f7f7f9; border: 1px solid #e8e8ed; border-radius: 8px; padding: 5px 10px; flex: 1; min-width: 140px; max-width: 320px; }
.search-bar svg { flex-shrink: 0; }
.search-bar input { flex: 1; border: none; background: transparent; font-size: 12px; color: #111118; outline: none; min-width: 0; }
.filtro-cat { padding: 5px 10px; border-radius: 7px; border: 1px solid #e8e8ed; font-size: 12px; color: #666; background: #fff; }
</style>
</head>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const SUPA_URL = 'https://lldfjxadijekkvulxumg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxsZGZqeGFkaWpla2t2dWx4dW1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTE4NjcsImV4cCI6MjA5NTA4Nzg2N30.chZlcRIKCPTJCI-idephg_ucpur-wKEocvTugmfdpt4';
const SH = { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json' };

const CATEGORIAS = ['Viajes','Representación','Gastos Varios de Oficina','Servicios Profesionales','Cuentas','Otros'];
const CAT_COLOR = { 'Viajes':'#3b82f6','Representación':'#f59e0b','Gastos Varios de Oficina':'#10b981','Servicios Profesionales':'#8b5cf6','Cuentas':'#ef4444','Otros':'#6b7280' };
const MONEDA_FLAG = { CLP:'🇨🇱', USD:'🇺🇸', PEN:'🇵🇪', BRL:'🇧🇷' };
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// ── Supabase helpers ──────────────────────────────────────────────────────────
async function supaGet(table, params = {}) {
  const url = new URL(`${SUPA_URL}/rest/v1/${table}`);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const r = await fetch(url, { headers: SH });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function supaPatch(table, filter = {}, data = {}) {
  const url = new URL(`${SUPA_URL}/rest/v1/${table}`);
  for (const [k, v] of Object.entries(filter)) url.searchParams.set(k, v);
  return fetch(url, { method: 'PATCH', headers: SH, body: JSON.stringify(data) });
}

async function supaPost(table, data, prefer = '') {
  const h = prefer ? {...SH, 'Prefer': prefer} : SH;
  return fetch(`${SUPA_URL}/rest/v1/${table}`, { method: 'POST', headers: h, body: JSON.stringify(data) });
}

async function supaCount(estado) {
  const r = await fetch(`${SUPA_URL}/rest/v1/fotos?estado=eq.${encodeURIComponent(estado)}&select=path`, {
    headers: {...SH, 'Prefer': 'count=exact', 'Range': '0-0'}
  });
  return parseInt(r.headers.get('content-range')?.split('/')[1] || 0);
}

// ── Formateo ──────────────────────────────────────────────────────────────────
function fmtFecha(f) {
  if (!f) return '—';
  const p = f.split('-');
  if (p.length !== 3) return f;
  return parseInt(p[2]) + ' ' + MESES[parseInt(p[1])-1] + ' ' + p[0];
}

function fmtMonto(p) {
  if (p.monto == null) return '—';
  const mon = p.moneda || 'CLP';
  const flag = mon !== 'CLP' ? (MONEDA_FLAG[mon] || '') + ' ' : '';
  return flag + Number(p.monto).toLocaleString('es-CL');
}

function montoStyle(p) {
  return (p.moneda && p.moneda !== 'CLP') ? 'font-weight:600;color:#4f46e5' : 'font-weight:600';
}

function catBadge(cat) {
  const c = CAT_COLOR[cat] || '#9ca3af';
  return `<span class="cat-badge"><span class="cat-dot" style="background:${c}"></span>${cat||'Otros'}</span>`;
}

function setStatus(txt) { document.getElementById('status').textContent = txt; }

// ── Tabs ──────────────────────────────────────────────────────────────────────
function irTab(tab) {
  document.querySelectorAll('.tab,.page').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'confirmados') cargarConfirmados();
  if (tab === 'validados')   cargarValidados();
  if (tab === 'otros')       cargarStats();
}

// ── CALIBRAR ──────────────────────────────────────────────────────────────────
let _calibrarData = [];
const selRec = new Set(), selNoRec = new Set();

async function cargarCalibar() {
  setStatus('Cargando...');
  document.getElementById('grid-recibos').innerHTML = '';
  document.getElementById('grid-no-recibos').innerHTML = '';
  selRec.clear(); selNoRec.clear();
  try {
    _calibrarData = await supaGet('fotos', {
      estado: 'in.(recibo,no_recibo)',
      select: 'path,name,proveedor,monto,moneda,fecha,estado,imagen_url',
      order: 'fecha.desc',
      limit: 200
    });
    const recibos   = _calibrarData.filter(p => p.estado === 'recibo');
    const noRecibos = _calibrarData.filter(p => p.estado === 'no_recibo');
    document.getElementById('sec-recibos').style.display    = recibos.length   ? '' : 'none';
    document.getElementById('sec-no-recibos').style.display = noRecibos.length ? '' : 'none';
    document.getElementById('empty-calibrar').style.display = (!recibos.length && !noRecibos.length) ? '' : 'none';
    document.getElementById('n-recibos').textContent    = recibos.length + ' fotos';
    document.getElementById('n-no-recibos').textContent = noRecibos.length + ' fotos';
    document.getElementById('badge-calibrar').textContent = recibos.length + noRecibos.length;
    recibos.forEach(p => document.getElementById('grid-recibos').appendChild(crearCardCal(p, 'recibo')));
    noRecibos.forEach(p => document.getElementById('grid-no-recibos').appendChild(crearCardCal(p, 'no-recibo')));
    setStatus('');
  } catch(e) { setStatus('Error: ' + e.message); }
}

function crearCardCal(p, tipo) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.path = p.path;
  const sec = tipo === 'recibo' ? 'recibos' : 'no-recibos';
  card.onclick = e => { if (!e.target.closest('button')) toggleSelCal(p.path, sec); };
  const imgSrc = p.imagen_url || '';
  const det = p.proveedor || p.name;
  const btns = tipo === 'recibo'
    ? `<button class="cv" onclick="event.stopPropagation();confirmarFoto('${p.path}',this)">✓ Confirmar</button>
       <button class="cr" onclick="event.stopPropagation();borrarFoto('${p.path}',this)">✕</button>`
    : `<button class="cr" onclick="event.stopPropagation();borrarFoto('${p.path}',this)">✕ Borrar</button>
       <button class="cv" onclick="event.stopPropagation();confirmarFoto('${p.path}',this)">✓ Es recibo</button>`;
  card.innerHTML = `
    <div class="chk"></div>
    ${imgSrc ? `<img src="${imgSrc}" loading="lazy" onclick="event.stopPropagation();abrirLightbox('${imgSrc}')" style="cursor:zoom-in">` : '<div style="height:120px;background:#f0f0f4;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px">Sin imagen</div>'}
    <div class="info"><div class="det" title="${det}">${det}</div><div class="acts">${btns}</div></div>`;
  return card;
}

function toggleSelCal(path, sec) {
  const s = sec === 'recibos' ? selRec : selNoRec;
  const card = document.querySelector(`.card[data-path="${CSS.escape(path)}"]`);
  if (!card) return;
  if (s.has(path)) { s.delete(path); card.classList.remove('sel'); card.querySelector('.chk').textContent = ''; }
  else             { s.add(path);    card.classList.add('sel');    card.querySelector('.chk').textContent = '✓'; }
  actualizarFloatBar();
}

function selTodos(sec) {
  const s = sec === 'recibos' ? selRec : selNoRec;
  const gridId = 'grid-' + sec;
  const cards = [...document.getElementById(gridId).querySelectorAll('.card')];
  const todos = cards.every(c => c.classList.contains('sel'));
  cards.forEach(c => {
    const path = c.dataset.path;
    if (todos) { s.delete(path); c.classList.remove('sel'); c.querySelector('.chk').textContent = ''; }
    else       { s.add(path);   c.classList.add('sel');    c.querySelector('.chk').textContent = '✓'; }
  });
  actualizarFloatBar();
}

function actualizarFloatBar() {
  const total = selRec.size + selNoRec.size;
  const bar = document.getElementById('float-bar');
  document.getElementById('float-n').textContent = total + ' seleccionada' + (total>1?'s':'');
  document.getElementById('float-confirmar').style.display = selRec.size > 0 ? '' : 'none';
  if (total > 0) bar.classList.add('visible'); else bar.classList.remove('visible');
  document.getElementById('btn-conf-sel').style.display = selRec.size > 0 ? '' : 'none';
  document.getElementById('btn-borr-sel').style.display = selNoRec.size > 0 ? '' : 'none';
  if (selRec.size) document.getElementById('btn-conf-sel').textContent = `✓ Confirmar sel. (${selRec.size})`;
  if (selNoRec.size) document.getElementById('btn-borr-sel').textContent = `✕ Borrar sel. (${selNoRec.size})`;
}

function floatConfirmar() { confirmarSeleccionados(); }
async function floatBorrar() {
  const paths = [...selRec, ...selNoRec];
  selRec.clear(); selNoRec.clear(); actualizarFloatBar();
  paths.forEach(p => document.querySelector(`.card[data-path="${CSS.escape(p)}"]`)?.remove());
  actualizarSecsCal();
  for (const p of paths) await supaPatch('fotos', {'path': `eq.${p}`}, {estado: 'borrado'});
}
function floatCancelar() {
  selRec.clear(); selNoRec.clear();
  document.querySelectorAll('.card.sel').forEach(c => { c.classList.remove('sel'); c.querySelector('.chk').textContent = ''; });
  actualizarFloatBar();
}

async function confirmarFoto(path, btn) {
  if (btn) btn.disabled = true;
  const card = document.querySelector(`.card[data-path="${CSS.escape(path)}"]`);
  if (card) card.remove();
  actualizarSecsCal();
  document.getElementById('badge-confirmados').textContent = parseInt(document.getElementById('badge-confirmados').textContent || 0) + 1;
  await supaPatch('fotos', {'path': `eq.${path}`}, {estado: 'confirmado'});
}

async function borrarFoto(path, btn) {
  if (btn) btn.disabled = true;
  const card = document.querySelector(`.card[data-path="${CSS.escape(path)}"]`);
  if (card) card.remove();
  actualizarSecsCal();
  await supaPatch('fotos', {'path': `eq.${path}`}, {estado: 'borrado'});
}

async function confirmarSeleccionados() {
  const paths = [...selRec]; selRec.clear(); actualizarFloatBar();
  paths.forEach(p => document.querySelector(`.card[data-path="${CSS.escape(p)}"]`)?.remove());
  actualizarSecsCal();
  for (const p of paths) await supaPatch('fotos', {'path': `eq.${p}`}, {estado: 'confirmado'});
}

async function borrarSeleccionados() {
  const paths = [...selNoRec]; selNoRec.clear(); actualizarFloatBar();
  paths.forEach(p => document.querySelector(`.card[data-path="${CSS.escape(p)}"]`)?.remove());
  actualizarSecsCal();
  for (const p of paths) await supaPatch('fotos', {'path': `eq.${p}`}, {estado: 'borrado'});
}

async function confirmarTodosRecibos() {
  const cards = [...document.getElementById('grid-recibos').querySelectorAll('.card')];
  const paths = cards.map(c => c.dataset.path);
  cards.forEach(c => c.remove()); actualizarSecsCal();
  for (const p of paths) await supaPatch('fotos', {'path': `eq.${p}`}, {estado: 'confirmado'});
}

async function borrarTodosNoRecibos() {
  const cards = [...document.getElementById('grid-no-recibos').querySelectorAll('.card')];
  const paths = cards.map(c => c.dataset.path);
  cards.forEach(c => c.remove()); actualizarSecsCal();
  for (const p of paths) await supaPatch('fotos', {'path': `eq.${p}`}, {estado: 'borrado'});
}

function actualizarSecsCal() {
  const nR  = document.getElementById('grid-recibos').querySelectorAll('.card').length;
  const nNR = document.getElementById('grid-no-recibos').querySelectorAll('.card').length;
  document.getElementById('sec-recibos').style.display    = nR   ? '' : 'none';
  document.getElementById('sec-no-recibos').style.display = nNR  ? '' : 'none';
  document.getElementById('empty-calibrar').style.display = (!nR && !nNR) ? '' : 'none';
  document.getElementById('n-recibos').textContent    = nR   + ' fotos';
  document.getElementById('n-no-recibos').textContent = nNR  + ' fotos';
  document.getElementById('badge-calibrar').textContent = nR + nNR;
}

// ── BOLETAS POR CONFIRMAR ─────────────────────────────────────────────────────
let _confirmados = [], _selConf = new Set();

async function cargarConfirmados() {
  document.getElementById('tbody-confirmados').innerHTML =
    '<tr><td colspan="7" style="padding:20px;color:#aaa;text-align:center">Cargando...</td></tr>';
  try {
    _confirmados = await supaGet('fotos', {
      estado: 'eq.confirmado',
      select: 'path,name,proveedor,monto,moneda,fecha,categoria,editado,imagen_url',
      order:  'fecha.desc'
    });
    _selConf.clear();
    poblarFiltroCat();
    renderConfirmados();
    document.getElementById('badge-confirmados').textContent = _confirmados.length;
  } catch(e) { setStatus('Error cargando confirmados'); }
}

function poblarFiltroCat() {
  const sel = document.getElementById('filtro-cat');
  const counts = {};
  _confirmados.forEach(p => { const c = p.categoria||'Otros'; counts[c] = (counts[c]||0)+1; });
  sel.innerHTML = '<option value="">Todas las categorías</option>';
  CATEGORIAS.forEach(cat => {
    if (!counts[cat]) return;
    const o = document.createElement('option');
    o.value = cat; o.textContent = `${cat} (${counts[cat]})`; sel.appendChild(o);
  });
  // Bulk cats
  const bc = document.getElementById('bulk-cats');
  bc.innerHTML = '';
  CATEGORIAS.forEach(cat => {
    const b = document.createElement('button');
    b.textContent = cat;
    b.style.cssText = `font-size:10px;padding:2px 9px;border-radius:20px;border:1.5px solid ${CAT_COLOR[cat]||'#9ca3af'};color:${CAT_COLOR[cat]||'#9ca3af'};background:#fff;cursor:pointer`;
    b.onclick = () => cambiarCatLote(cat);
    bc.appendChild(b);
  });
}

function renderConfirmados() {
  const q   = document.getElementById('buscar-confirmados').value.trim().toLowerCase();
  const cat = document.getElementById('filtro-cat').value;
  const filtrados = _confirmados.filter(p => {
    if (cat && (p.categoria||'Otros') !== cat) return false;
    if (q) {
      const txt = [p.proveedor||'', p.fecha||'', p.monto||'', p.categoria||'', p.moneda||''].join(' ').toLowerCase();
      if (!txt.includes(q)) return false;
    }
    return true;
  });
  const n = _confirmados.length;
  document.getElementById('n-confirmados').textContent = n + ' recibo' + (n!==1?'s':'') + (filtrados.length!==n ? ' · ' + filtrados.length + ' mostrados' : '');
  const tbody = document.getElementById('tbody-confirmados');
  tbody.innerHTML = '';
  document.getElementById('empty-confirmados').style.display = filtrados.length ? 'none' : '';
  filtrados.forEach(p => {
    const prov = p.proveedor && !['[ilegible]','[sin_archivo]'].includes(p.proveedor) ? p.proveedor : null;
    const cat  = p.categoria || 'Otros';
    const mon  = p.moneda || 'CLP';
    const sel  = _selConf.has(p.name);
    const incompleto = !prov || p.monto == null;
    const tr = document.createElement('tr');
    tr.dataset.name = p.name;
    if (sel) tr.classList.add('sel');
    tr.onmouseenter = function() { if (!_selConf.has(p.name)) this.style.background='#f7f7fb'; };
    tr.onmouseleave = function() { this.style.background = _selConf.has(p.name) ? '' : ''; this.classList.toggle('sel', _selConf.has(p.name)); };
    tr.innerHTML = `
      <td><input type="checkbox" class="fila-chk" ${sel?'checked':''} style="width:14px;height:14px;cursor:pointer;accent-color:#4f46e5"></td>
      <td>${p.imagen_url ? `<img src="${p.imagen_url}" onerror="this.style.display='none'">` : '<div style="width:40px;height:40px;background:#f0f0f4;border-radius:6px"></div>'}</td>
      <td>${prov ? `<span style="font-weight:500;color:#111118">${prov}</span>` : '<span style="color:#ccc;font-style:italic">Sin datos</span>'}${incompleto ? ' <span style="font-size:10px;background:#fff7ed;color:#c2410c;border:1px solid #fdba74;border-radius:4px;padding:1px 5px">⚠</span>' : ''}</td>
      <td style="color:#aaa;font-size:12px;white-space:nowrap">${fmtFecha(p.fecha)}</td>
      <td class="right" style="${montoStyle(p)};white-space:nowrap;font-variant-numeric:tabular-nums">${fmtMonto(p)}</td>
      <td>${catBadge(cat)}</td>
      <td class="right" style="white-space:nowrap"><div style="display:inline-flex;gap:5px"><button class="btn-confirmar-fila">✓ Confirmar</button><button class="btn-rechazar-fila">✗</button></div></td>`;
    tr.querySelector('.fila-chk').addEventListener('change', e => { e.stopPropagation(); toggleFilaConf(e.target, p.name); });
    tr.querySelector('.btn-confirmar-fila').addEventListener('click', e => { e.stopPropagation(); validarUno(p.name, 'confirmar'); });
    tr.querySelector('.btn-rechazar-fila').addEventListener('click',  e => { e.stopPropagation(); validarUno(p.name, 'rechazar'); });
    tr.onclick = () => abrirModal(p);
    tbody.appendChild(tr);
  });
}

function toggleFilaConf(chk, name) {
  if (chk.checked) _selConf.add(name); else _selConf.delete(name);
  const tr = document.querySelector(`#tbody-confirmados tr[data-name="${CSS.escape(name)}"]`);
  if (tr) tr.classList.toggle('sel', chk.checked);
  actualizarBulkBar();
}

function toggleTodos(checked) {
  document.querySelectorAll('#tbody-confirmados tr[data-name]').forEach(tr => {
    const name = tr.dataset.name;
    if (checked) _selConf.add(name); else _selConf.delete(name);
    tr.classList.toggle('sel', checked);
    const chk = tr.querySelector('input[type=checkbox]');
    if (chk) chk.checked = checked;
  });
  actualizarBulkBar();
}

function limpiarSeleccion() {
  _selConf.clear();
  document.querySelectorAll('#tbody-confirmados input[type=checkbox]').forEach(c => c.checked = false);
  document.querySelectorAll('#tbody-confirmados tr').forEach(tr => tr.classList.remove('sel'));
  document.getElementById('chk-all').checked = false;
  actualizarBulkBar();
}

function actualizarBulkBar() {
  const n = _selConf.size;
  const bar = document.getElementById('bulk-bar');
  bar.classList.toggle('visible', n > 0);
  document.getElementById('bulk-count').textContent = n + ' seleccionado' + (n!==1?'s':'');
}

async function cambiarCatLote(cat) {
  if (!_selConf.size) return;
  const names = [..._selConf];
  for (const name of names) {
    await supaPatch('fotos', {'name': `eq.${name}`}, {categoria: cat, editado: 1});
    const p = _confirmados.find(x => x.name === name);
    if (p) p.categoria = cat;
  }
  renderConfirmados();
}

async function cambiarComercioLote() {
  if (!_selConf.size) return;
  const input = document.getElementById('bulk-comercio-input');
  const proveedor = input.value.trim();
  if (!proveedor) { input.focus(); return; }
  const names = [..._selConf];
  for (const name of names) {
    await supaPatch('fotos', {'name': `eq.${name}`}, {proveedor, editado: 1});
    const p = _confirmados.find(x => x.name === name);
    if (p) { p.proveedor = proveedor; p.editado = 1; }
  }
  input.value = '';
  renderConfirmados();
}

async function validarUno(name, accion) {
  const nuevoEstado = accion === 'confirmar' ? 'validado' : 'rechazado_gasto';
  const p = _confirmados.find(x => x.name === name);
  if (!p) return;
  await supaPatch('fotos', {'name': `eq.${name}`, 'estado': 'eq.confirmado'}, {estado: nuevoEstado});
  if (accion === 'confirmar') await guardarAprendizaje(p.proveedor, p.categoria);
  _confirmados = _confirmados.filter(x => x.name !== name);
  _selConf.delete(name);
  renderConfirmados();
  document.getElementById('badge-confirmados').textContent = _confirmados.length;
}

async function validarLote(accion) {
  if (!_selConf.size) return;
  const names = [..._selConf];
  const nuevoEstado = accion === 'confirmar' ? 'validado' : 'rechazado_gasto';
  for (const name of names) {
    const p = _confirmados.find(x => x.name === name);
    await supaPatch('fotos', {'name': `eq.${name}`, 'estado': 'eq.confirmado'}, {estado: nuevoEstado});
    if (accion === 'confirmar' && p) await guardarAprendizaje(p.proveedor, p.categoria);
  }
  _confirmados = _confirmados.filter(x => !_selConf.has(x.name));
  _selConf.clear();
  renderConfirmados();
  document.getElementById('badge-confirmados').textContent = _confirmados.length;
  document.getElementById('chk-all').checked = false;
}

async function guardarAprendizaje(proveedor, categoria) {
  if (!proveedor || !categoria) return;
  try {
    const rows = await supaGet('aprendizaje', {patron: `eq.${proveedor}`, select: 'usos'});
    if (rows.length) {
      const usos = (rows[0].usos || 1) + 1;
      await supaPatch('aprendizaje', {patron: `eq.${proveedor}`}, {categoria, usos});
    } else {
      await supaPost('aprendizaje', {patron: proveedor, nombre_correcto: proveedor, categoria, creado_en: new Date().toISOString()});
    }
  } catch(e) { /* non-critical */ }
}

// ── GASTOS CONFIRMADOS ────────────────────────────────────────────────────────
let _validados = [];

async function cargarValidados() {
  document.getElementById('tbody-validados').innerHTML =
    '<tr><td colspan="5" style="padding:20px;color:#aaa;text-align:center">Cargando...</td></tr>';
  try {
    _validados = await supaGet('fotos', {
      estado: 'eq.validado',
      select: 'path,name,proveedor,monto,moneda,fecha,categoria,editado',
      order:  'fecha.desc,procesado_en.desc'
    });
    renderValidados();
    document.getElementById('badge-validados').textContent = _validados.length;
  } catch(e) { setStatus('Error cargando gastos'); }
}

function renderValidados() {
  const q = document.getElementById('buscar-validados').value.trim().toLowerCase();
  const filtrados = _validados.filter(p => {
    if (!q) return true;
    return [p.proveedor||'', p.fecha||'', p.monto||'', p.categoria||''].join(' ').toLowerCase().includes(q);
  });
  const n = _validados.length;
  document.getElementById('n-validados').textContent = n + ' gasto' + (n!==1?'s':'') + (filtrados.length!==n ? ' · ' + filtrados.length + ' mostrados':'');
  const tbody = document.getElementById('tbody-validados');
  tbody.innerHTML = '';
  document.getElementById('empty-validados').style.display = filtrados.length ? 'none' : '';
  filtrados.forEach(p => {
    const cat = p.categoria || 'Otros';
    const tr  = document.createElement('tr');
    tr.innerHTML = `
      <td><div style="width:40px;height:40px;background:#f0f0f4;border-radius:6px"></div></td>
      <td style="font-weight:500;color:#111118">${p.proveedor||'—'}</td>
      <td style="color:#aaa;font-size:12px">${fmtFecha(p.fecha)}</td>
      <td class="right" style="${montoStyle(p)};font-variant-numeric:tabular-nums">${fmtMonto(p)}</td>
      <td>${catBadge(cat)}</td>`;
    tr.onclick = () => abrirModal(p, true);
    tbody.appendChild(tr);
  });
}

// ── MODAL EDICIÓN ─────────────────────────────────────────────────────────────
let _modalData = null, _catSel = 'Otros';

function abrirModal(p, esValidado = false) {
  _modalData = p;
  _catSel = p.categoria || 'Otros';
  const imgSrc = p.imagen_url || '';
  document.getElementById('modal-img').src = imgSrc;
  document.getElementById('modal-img').style.display = imgSrc ? '' : 'none';
  document.getElementById('modal-title').textContent = esValidado ? 'Editar gasto' : 'Editar recibo';
  document.getElementById('modal-borrar').style.display = esValidado ? 'none' : '';
  document.getElementById('modal-proveedor').value = (p.proveedor && !['[ilegible]','[sin_archivo]'].includes(p.proveedor)) ? p.proveedor : '';
  document.getElementById('modal-monto').value = p.monto != null ? p.monto : '';
  document.getElementById('modal-moneda').value = p.moneda || 'CLP';
  document.getElementById('modal-fecha').value = p.fecha || '';
  document.getElementById('modal-fecha').max = new Date().toISOString().slice(0,10);
  // Render cat buttons
  const cont = document.getElementById('modal-cats');
  cont.innerHTML = '';
  CATEGORIAS.forEach(cat => {
    const b = document.createElement('button');
    b.textContent = cat; b.dataset.cat = cat;
    const sel = cat === _catSel;
    b.style.cssText = `font-size:11px;padding:5px 12px;border-radius:20px;border:1.5px solid ${CAT_COLOR[cat]||'#9ca3af'};cursor:pointer;background:${sel?CAT_COLOR[cat]:'#f3f4f6'};color:${sel?'#fff':'#374151'};font-weight:${sel?'700':'400'}`;
    b.onclick = () => seleccionarCat(b);
    cont.appendChild(b);
  });
  document.getElementById('modal-status').textContent = '';
  document.getElementById('modal').style.display = 'flex';
}

function seleccionarCat(btn) {
  _catSel = btn.dataset.cat;
  document.querySelectorAll('#modal-cats button').forEach(b => {
    const sel = b.dataset.cat === _catSel;
    b.style.background = sel ? CAT_COLOR[b.dataset.cat] : '#f3f4f6';
    b.style.color      = sel ? '#fff' : '#374151';
    b.style.fontWeight = sel ? '700' : '400';
  });
}

function cerrarModal() { document.getElementById('modal').style.display = 'none'; _modalData = null; }

async function guardarModal() {
  if (!_modalData) return;
  const btn = document.getElementById('modal-guardar');
  const proveedor = document.getElementById('modal-proveedor').value.trim();
  const monto     = parseFloat(document.getElementById('modal-monto').value) || null;
  const moneda    = document.getElementById('modal-moneda').value;
  const fecha     = document.getElementById('modal-fecha').value.trim();
  const categoria = _catSel || 'Otros';
  btn.textContent = 'Guardando...'; btn.disabled = true;
  try {
    const estados = ['confirmado','validado'];
    await supaPatch('fotos',
      {'name': `eq.${_modalData.name}`, 'estado': `in.(${estados.join(',')})`},
      {proveedor, monto, moneda, fecha, categoria, editado: 1}
    );
    // Update local data
    const src = _confirmados.length ? _confirmados : _validados;
    const idx = src.findIndex(x => x.name === _modalData.name);
    if (idx >= 0) Object.assign(src[idx], {proveedor, monto, moneda, fecha, categoria, editado: 1});
    btn.textContent = '✓ Guardado'; btn.style.background = '#10b981';
    if (_confirmados.find(x => x.name === _modalData.name)) renderConfirmados();
    else renderValidados();
    setTimeout(cerrarModal, 900);
  } catch(e) {
    btn.textContent = '✗ Error'; btn.style.background = '#ef4444';
    setTimeout(() => { btn.textContent = 'Guardar'; btn.style.background = '#4f46e5'; btn.disabled = false; }, 2000);
  }
}

async function borrarConfirmado() {
  if (!_modalData) return;
  const nombre = _modalData.proveedor || _modalData.name;
  if (!confirm(`¿Borrar "${nombre}"? No se puede deshacer.`)) return;
  const btn = document.getElementById('modal-borrar');
  btn.textContent = 'Borrando...'; btn.disabled = true;
  await supaPatch('fotos', {'name': `eq.${_modalData.name}`, 'estado': 'eq.confirmado'}, {estado: 'borrado'});
  _confirmados = _confirmados.filter(x => x.name !== _modalData.name);
  renderConfirmados();
  document.getElementById('badge-confirmados').textContent = _confirmados.length;
  cerrarModal();
}

// ── STATS ─────────────────────────────────────────────────────────────────────
async function cargarStats() {
  const cont = document.getElementById('stats-cards');
  cont.innerHTML = '<p style="color:#aaa;text-align:center;padding:20px">Cargando...</p>';
  try {
    const [nConf, nValid, nRec, nNoRec, nBorr] = await Promise.all([
      supaCount('confirmado'), supaCount('validado'), supaCount('recibo'),
      supaCount('no_recibo'),  supaCount('borrado')
    ]);
    const items = [
      { label: 'Por calibrar (recibos)', val: nRec, color: '#15803d' },
      { label: 'Por calibrar (no recibos)', val: nNoRec, color: '#dc2626' },
      { label: 'Por confirmar', val: nConf, color: '#4f46e5' },
      { label: 'Gastos confirmados', val: nValid, color: '#059669' },
      { label: 'Borrados', val: nBorr, color: '#9ca3af' },
    ];
    cont.innerHTML = items.map(i => `
      <div style="background:#fff;border:1px solid #ebebef;border-radius:12px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:#666">${i.label}</span>
        <span style="font-size:22px;font-weight:700;color:${i.color}">${i.val.toLocaleString()}</span>
      </div>`).join('');
  } catch(e) { cont.innerHTML = '<p style="color:#e44">Error cargando stats</p>'; }
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function abrirLightbox(url) { document.getElementById('lightbox-img').src = url; document.getElementById('lightbox').classList.add('open'); }
function cerrarLightbox()   { document.getElementById('lightbox').classList.remove('open'); document.getElementById('lightbox-img').src = ''; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') { cerrarLightbox(); cerrarModal(); } });

// ── Init ──────────────────────────────────────────────────────────────────────
function recargar() {
  const tab = document.querySelector('.tab.active')?.id?.replace('tab-','') || 'calibrar';
  if (tab === 'calibrar')   cargarCalibar();
  if (tab === 'confirmados') cargarConfirmados();
  if (tab === 'validados')   cargarValidados();
  if (tab === 'otros')       cargarStats();
}

// Cargar badges al arrancar
Promise.all([supaCount('recibo'), supaCount('no_recibo'), supaCount('confirmado'), supaCount('validado')])
  .then(([r, nr, c, v]) => {
    document.getElementById('badge-calibrar').textContent = r + nr;
    document.getElementById('badge-confirmados').textContent = c;
    document.getElementById('badge-validados').textContent = v;
  });

cargarCalibar();
</script>
